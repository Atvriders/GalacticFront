<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GalacticFront.io</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a1a;
        color: #e0e0e0;
        font-family: system-ui, -apple-system, sans-serif;
      }
      #app {
        width: 100%;
        height: 100%;
        position: relative;
      }
      #game-canvas {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
      }
      #sidebar-nav {
        position: absolute;
        top: 0;
        left: 0;
        width: 260px;
        height: 100%;
        z-index: 10;
        pointer-events: none;
      }
      #modal-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 100;
        pointer-events: none;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #modal-container.active {
        pointer-events: all;
        background: rgba(0, 0, 0, 0.6);
      }
      #hud-overlay {
        position: absolute;
        top: 0;
        right: 0;
        z-index: 10;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="game-canvas"></div>
      <div id="sidebar-nav"></div>
      <div id="hud-overlay"></div>
      <div id="modal-container"></div>
    </div>
    <script type="module" src="/src/client/Main.ts"></script>
  </body>
</html>
