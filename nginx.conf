worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 4096;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream master {
        server 127.0.0.1:3000;
    }

    # Worker upstreams w0-w40 on ports 3001-3041
    upstream worker0  { server 127.0.0.1:4000; }
    upstream worker1  { server 127.0.0.1:4001; }
    upstream worker2  { server 127.0.0.1:4002; }
    upstream worker3  { server 127.0.0.1:4003; }
    upstream worker4  { server 127.0.0.1:4004; }
    upstream worker5  { server 127.0.0.1:4005; }
    upstream worker6  { server 127.0.0.1:4006; }
    upstream worker7  { server 127.0.0.1:4007; }
    upstream worker8  { server 127.0.0.1:4008; }
    upstream worker9  { server 127.0.0.1:4009; }
    upstream worker10 { server 127.0.0.1:4010; }
    upstream worker11 { server 127.0.0.1:4011; }
    upstream worker12 { server 127.0.0.1:4012; }
    upstream worker13 { server 127.0.0.1:4013; }
    upstream worker14 { server 127.0.0.1:4014; }
    upstream worker15 { server 127.0.0.1:4015; }
    upstream worker16 { server 127.0.0.1:4016; }
    upstream worker17 { server 127.0.0.1:4017; }
    upstream worker18 { server 127.0.0.1:4018; }
    upstream worker19 { server 127.0.0.1:4019; }
    upstream worker20 { server 127.0.0.1:4020; }
    upstream worker21 { server 127.0.0.1:4021; }
    upstream worker22 { server 127.0.0.1:4022; }
    upstream worker23 { server 127.0.0.1:4023; }
    upstream worker24 { server 127.0.0.1:4024; }
    upstream worker25 { server 127.0.0.1:4025; }
    upstream worker26 { server 127.0.0.1:4026; }
    upstream worker27 { server 127.0.0.1:4027; }
    upstream worker28 { server 127.0.0.1:4028; }
    upstream worker29 { server 127.0.0.1:4029; }
    upstream worker30 { server 127.0.0.1:4030; }
    upstream worker31 { server 127.0.0.1:4031; }
    upstream worker32 { server 127.0.0.1:4032; }
    upstream worker33 { server 127.0.0.1:4033; }
    upstream worker34 { server 127.0.0.1:4034; }
    upstream worker35 { server 127.0.0.1:4035; }
    upstream worker36 { server 127.0.0.1:4036; }
    upstream worker37 { server 127.0.0.1:4037; }
    upstream worker38 { server 127.0.0.1:4038; }
    upstream worker39 { server 127.0.0.1:4039; }
    upstream worker40 { server 127.0.0.1:4040; }

    server {
        listen 80;
        server_name _;

        # Static asset caching: JS/CSS with hash get 1 year immutable
        location ~* \.(js|css)$ {
            root /app/public;
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri @master;
        }

        # HTML gets short cache
        location ~* \.html$ {
            root /app/public;
            add_header Cache-Control "public, max-age=1";
            try_files $uri @master;
        }

        # Worker routes: /w0/* through /w40/*
        location ~ ^/w(\d+)(/.*)?$ {
            set $worker_id $1;
            set $worker_path $2;

            proxy_pass http://worker$worker_id$worker_path$is_args$args;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
        }

        # Default: proxy to master
        location / {
            proxy_pass http://master;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
        }

        location @master {
            proxy_pass http://master;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}
